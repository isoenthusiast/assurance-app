# Railway deployment config for seam-assurance-app
# See: https://docs.railway.com/reference/config-as-code
#
# Prerequisites on Railway dashboard:
#   - Add PostgreSQL plugin to your project
#   - Environment variable: DATABASE_URL (auto-set by Railway PG plugin)
#   - Environment variable: AUTH_SECRET
#   - Environment variable: ADMIN_PASSWORD

[build]
builder = "RAILPACK"
buildCommand = "npx prisma generate && npm run build"

[deploy]
preDeployCommand = "npx prisma db push && npx tsx prisma/seed.ts"
startCommand = "npm run start"
